apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sms
  template:
    metadata:
      labels:
        app: sms
    spec:
      containers:
        - name: sms-container
          image: studentmarkservice
          imagePullPolicy: Never
          ports:
            - containerPort: 8100
---
apiVersion: v1
kind: Service
metadata:
  name: sms-service
spec:
  type: NodePort
  selector:
    app: sms
  ports:
    - port: 8100
      targetPort: 8100
      nodePort: 30007
