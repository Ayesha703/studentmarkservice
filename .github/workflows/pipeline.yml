name: StudentMarkService CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-docker:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: '21'

    - name: Build Maven project
      run: mvn clean package

    - name: Build Docker image
      run: docker build -t studentmarkservice-image:latest .

    - name: Run Docker container
      run: docker run -d -p 8100:8100 --name studentmarkservice studentmarkservice-image:latest
